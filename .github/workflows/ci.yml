name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # package-lock.jsonはコミットしていない（Windowsで生成するとLinux向け
      # ネイティブ依存が欠落しCloudflareのビルドが失敗するため）。npm ciではなくnpm installを使う。
      - run: npm install
      - run: npm run lint
      - run: npm run build
      # Vitestによるテストは導入次第このジョブに追加する（PROGRESS.md参照）

  backend-arm64-build-check:
    runs-on: ubuntu-latest
    # GitHub Actionsのホストランナーはx86_64のため、本番環境（Oracle Cloud Ampere/ARM）
    # 向けのイメージが実際にビルドできることをQEMUエミュレーションで検証する。
    # ARM固有のホイール欠如（例: 過去のLightGBM等）はここで検知する（REQUIREMENTS_v2.md 1.2）。
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: false
